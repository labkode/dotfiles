set-option -g default-shell /bin/zsh

unbind C-b
set -g prefix C-a

bind -n C-a-Left select-pane -L
bind -n C-a-Right select-pane -R
bind -n C-a-Up select-pane -U
bind -n C-a-Down select-pane -D

set-window-option -g window-status-current-bg yellow

unbind %
bind | split-window -h
bind - split-window -v

setw -g mode-keys vi
